name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          # Normalize possible Windows CRLF from secret to avoid libcrypto parse errors.
          echo "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "Invalid VPS_SSH_KEY format. Put full OpenSSH private key into secret."
            exit 1
          fi

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy files to VPS via rsync
        run: |
          # Секреты не в Git (.gitignore). Без exclude rsync --delete удалит их на сервере.
          # Весь api/cache не синхронизируем: там www-data кладёт rates_snapshot.json; частичный exclude оставлял
          # api/cache/.gitignore — rsync трогал каталог и падал с «failed to set permissions … Operation not permitted».
          # Исключённые пути при --delete на приёмнике не удаляются (см. man rsync).
          rsync -az --delete -O \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "tz/" \
            --exclude "api/config.php" \
            --exclude "api/telegram_config.php" \
            --exclude "api/cache/" \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p ${{ secrets.VPS_PORT }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/one-pager/"

      # Без sudo (в CI нет TTY для пароля): chgrp + setgid; пользователь деплоя ∈ группа www-data.
      - name: Ensure api/cache writable for www-data
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p ${{ secrets.VPS_PORT }} \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash /var/www/one-pager/scripts/fix-cache-perms.sh'

      # Перезапуск бота: в CI нет интерактивного sudo → обычный sudo не работает.
      # Вариант A (рекомендуется): секрет VPS_TELEGRAM_RESTART_SSH_KEY — отдельный приватный ключ,
      #   публичная часть у пользователя root в ~/.ssh/authorized_keys (или ограничение command="systemctl …").
      # Вариант B: на сервере NOPASSWD для deploy:
      #   sudo visudo -f /etc/sudoers.d/deploy
      #   deploy ALL=(ALL) NOPASSWD: /usr/bin/systemctl restart one-pager-telegram-bot.service
      - name: Restart Telegram bot (systemd)
        shell: bash
        run: |
          set -euo pipefail
          PORT="${{ secrets.VPS_PORT }}"
          HOST="${{ secrets.VPS_HOST }}"
          DEPLOY_USER="${{ secrets.VPS_USER }}"
          UNIT="one-pager-telegram-bot.service"

          echo "${{ secrets.VPS_TELEGRAM_RESTART_SSH_KEY }}" | tr -d '\r' > ~/.ssh/telegram_restart_key
          if ssh-keygen -y -f ~/.ssh/telegram_restart_key >/dev/null 2>&1; then
            chmod 600 ~/.ssh/telegram_restart_key
            ssh -i ~/.ssh/telegram_restart_key -o IdentitiesOnly=yes -p "$PORT" \
              "root@${HOST}" \
              "/usr/bin/systemctl restart ${UNIT}"
            echo "Telegram bot restarted (key VPS_TELEGRAM_RESTART_SSH_KEY)."
            rm -f ~/.ssh/telegram_restart_key
            exit 0
          fi
          rm -f ~/.ssh/telegram_restart_key

          if ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p "$PORT" \
              "${DEPLOY_USER}@${HOST}" \
              "sudo -n /usr/bin/systemctl restart ${UNIT}"; then
            echo "Telegram bot restarted (sudo -n / NOPASSWD)."
            exit 0
          fi

          echo "::error::Задайте секрет VPS_TELEGRAM_RESTART_SSH_KEY (ключ для root@VPS) или NOPASSWD для sudo -n systemctl restart — см. комментарий в deploy-timeweb.yml"
          exit 1
