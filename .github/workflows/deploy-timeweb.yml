name: Deploy to Timeweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate deploy marker file
        run: |
          echo "commit=${GITHUB_SHA}" > deploy-marker.txt
          echo "deployed_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> deploy-marker.txt

      - name: Upload files to Timeweb via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TIMEWEB_FTP_HOST }}
          username: ${{ secrets.TIMEWEB_FTP_USER }}
          password: ${{ secrets.TIMEWEB_FTP_PASSWORD }}
          server-dir: ${{ secrets.TIMEWEB_FTP_TARGET_DIR }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.cursor/**
            **/README.md
            **/PROJECT_STATUS.md
            **/CALCULATION.md
            **/SALES_PRESENTATION.md
