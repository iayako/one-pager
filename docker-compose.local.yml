services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: onepager_db
      MYSQL_USER: onepager_user
      MYSQL_PASSWORD: onepager_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - onepager_mysql_data:/var/lib/mysql
      - ./api/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  onepager_mysql_data:
